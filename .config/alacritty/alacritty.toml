import = [
  "~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml"
]

live_config_reload = true

[shell]
program = "/bin/zsh"

[window]
opacity = 0.9
blur = true
padding = {x = 8, y = 4}

[font]
size = 11

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font"
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Iosevka Nerd Font"
style = "Bold Italic"

[cursor]
style = "Beam"
